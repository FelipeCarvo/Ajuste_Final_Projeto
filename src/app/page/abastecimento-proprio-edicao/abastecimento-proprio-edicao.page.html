<ion-header class="os-header">
  <ion-toolbar lines="none">
    <div class="os-header-bar">
      <!-- casinha -->
      <button class="os-back-btn" (click)="onBack()">
        <img src="../../assets/icon/topoRequest.svg" alt="Voltar" />
      </button>

      <h1 class="os-title">Abastecimento Próprio - Edição</h1>

      <div class="os-header-spacer"></div>
    </div>
  </ion-toolbar>
</ion-header>

<ion-content class="os-content">
  <div class="os-page">
    <div class="os-card">


<div class="abp-field">
  <label class="abp-label">Origem / Tanque</label>

<app-autocomplete
  [lista]="bombas"
  placeholder="Selecione uma origem/tanque"
  campoDescricao="bombaDescricao"
  [valorSelecionado]="bombaSelecionada"
  (selecionado)="selecionarBomba($event)">
</app-autocomplete>
</div>



      <!-- Equipamento -->
<div class="abp-field">
  <label class="abp-label">Equipamento</label>

  <app-autocomplete
 [lista]="equipamentos"
placeholder="Selecione um equipamento"
campoDescricao="descricao"
[valorSelecionado]="equipamentoSelecionado"
(selecionado)="selecionarEquipamento($event)"
    >
  </app-autocomplete>
</div>


      <!-- DATA  -->
      <div class="abp-field">
  <label class="abp-label">Data do abastecimento</label>

  <div class="abp-date-input">
<input
  type="text"
  class="os-input"
  readonly
  placeholder="dd/mm/aaaa"
  [value]="formatDate(data)"
  (click)="openCalendar($event)"
/>

    <!-- BOTÃO CALENDÁRIO -->
    <button
      type="button"
      class="abp-date-btn"
      title="Selecionar data do abastecimento"
      aria-label="Selecionar data do abastecimento"
      (click)="openCalendar($event)">
      <ion-icon name="calendar-outline"></ion-icon>
    </button>
  </div>
</div>

      <!-- Bomba / Bico e Destino (ainda sem API, por enquanto só layout) -->
      <div class="abp-group-row">
        <div class="abp-field abp-half">
          <label class="abp-label">Bomba / Bico</label>
          <app-autocomplete
            [lista]="bicos"
            placeholder="Selecione um bico"
            campoDescricao="descricao"
            [valorSelecionado]="bicoSelecionado"
            (selecionado)="onBicoChange($event?.id)">
          </app-autocomplete>
        </div>
        <div class="abp-field abp-half">
          <label class="abp-label">Destino</label>
            <app-autocomplete
              [lista]="destinos"
              placeholder="Selecione um destino"
              campoDescricao="descricao"
              [valorSelecionado]="destinoSelecionado"
              [disabled]="destinoTravado"
              (selecionado)="selecionarDestino($event)">
            </app-autocomplete>
        </div>
      </div>

      <!-- Empreendimento / Etapa -->
      <div class="abp-group-row">
        <div class="abp-field abp-half">
          <label class="abp-label">Empreendimento</label>
        <app-autocomplete
          [lista]="empreendimentos"
          placeholder="Selecione um empreendimento"
          campoDescricao="descricao"
          [valorSelecionado]="empreendimentoSelecionado"
          (selecionado)="selecionarEmpreendimento($event)">
        </app-autocomplete>
        </div>


        <div class="abp-field abp-half">
          <label class="abp-label">Etapa</label>
          <app-autocomplete
              [lista]="etapas"
              placeholder="Selecione uma etapa"
              campoDescricao="descricao"
              [valorSelecionado]="etapaSelecionada"
              (selecionado)="selecionarEtapa($event)">
            </app-autocomplete>
            </div>
          </div>

      <!-- Odômetro -->
    <div class="abp-group-row">

  <div class="abp-field abp-half">
    <label class="abp-label">Odômetro Atual</label>
    <input
      type="number"
      class="os-input"
      title="Informe o odometro atual"
      placeholder="Informe o odometro atual"
      min="0"
      max="2147483647"
      step="1"
      [(ngModel)]="odometroAtual"
    />
  </div>

  <div class="abp-field abp-half">
    <label class="abp-label">Odômetro Abastecimento</label>
    <input
      type="number"
      class="os-input"
      title="Informe o odometro do abastecimento"
      placeholder="Informe o odometro do abastecimento"
      min="0"
      max="2147483647"
      step="1"
      [(ngModel)]="odometro"
    />
  </div>

</div>

<div class="abp-group-row">

  <div class="abp-field abp-half">
    <label class="abp-label">Horímetro Atual</label>
    <input
      type="number"
      class="os-input"
      title="Informe o horimetro atual"
      placeholder="Informe o horimetro atual"
      min="0"
      max="2147483647"
      step="1"
      [(ngModel)]="horimetroAtual"
    />
  </div>

  <div class="abp-field abp-half">
    <label class="abp-label">Horímetro</label>
    <input
      type="number"
      class="os-input"
      title="Informe o horimetro do abastecimento"
      placeholder="Informe o horimetro do abastecimento"
      min="0"
      max="2147483647"
      step="1"
      [(ngModel)]="horimetro"
    />
  </div>

</div>
 <!-- Insumo -->
<div class="abp-field">
  <label class="abp-label">Insumo</label>

<app-autocomplete
  [lista]="insumos"
  placeholder="Selecione um insumo"
  campoDescricao="insumoDescr"
  [valorSelecionado]="insumoSelecionado"
  (selecionado)="selecionarInsumo($event)">
</app-autocomplete>

</div>

<!-- Troca / Reposição e Aplicação -->
<div class="abp-group-row">

  <div class="abp-field abp-half">
    <label class="abp-label">Troca / Reposição</label>

    <app-autocomplete
      [lista]="tiposPrevAbast"
      placeholder="Selecione um tipo"
      campoDescricao="descricao"
      [valorSelecionado]="tipoPrevAbast"
      (selecionado)="selecionarTipoPrevAbast($event)">
    </app-autocomplete>
  </div>

  <div class="abp-field abp-half">
    <label class="abp-label">Aplicação</label>

<app-autocomplete
  [lista]="aplicacoes"
 placeholder="Selecione uma aplicacao"
 campoDescricao="descricao"
  [valorSelecionado]="aplicacaoSelecionada"
  [disabled]="!aplicacaoHabilitada"
  (selecionado)="selecionarAplicacao($event)">
</app-autocomplete>
  </div>

</div>
<!-- Quantidade / No.Bomba -->
<div class="abp-group-row">

  <div class="abp-field abp-third">
    <label class="abp-label">Quantidade</label>
    <input
      type="number"
      class="os-input"
      title="Informe a quantidade abastecida"
      placeholder="Informe a quantidade"
      [(ngModel)]="quantidade"
      (input)="onQuantidadeChange($event)"
    />
  </div>

  <div class="abp-field abp-third">
    <label class="abp-label">No.Bomba Inicial</label>
    <input
      type="number"
      class="os-input"
      title="Informe o numero inicial da bomba"
      placeholder="Informe o numero inicial"
      min="0"
      max="2147483647"
      step="1"
      [(ngModel)]="numBombaInicial"
      (input)="onNumBombaInicialChange($event)"
    />
  </div>

  <div class="abp-field abp-third">
    <label class="abp-label">No.Bomba Final</label>
    <input
      type="number"
      class="os-input"
      title="Informe o numero final da bomba"
      placeholder="Informe o numero final"
      min="0"
      max="2147483647"
      step="1"
      [(ngModel)]="numBombaFinal"
      (input)="onNumBombaFinalChange($event)"
    />
  </div>

</div>

      <!-- Motorista / Operador (agora ligado na API) -->
      <div class="abp-group-row">
<div class="abp-field abp-half">
  <label class="abp-label">Motorista / Operador</label>

  <app-autocomplete
  [lista]="motoristasOperadores"
  placeholder="Selecione um motorista/operador"
  campoDescricao="colaboradorNome"
  [valorSelecionado]="motoristaOperadorSelecionado"
  (selecionado)="selecionarMotoristaOperador($event)">
</app-autocomplete>
</div>

     <div class="abp-field abp-half">
  <label class="abp-label">Colaborador / Frentista</label>

<app-autocomplete
  [lista]="colaboradoresFrentista"
  placeholder="Selecione um colaborador/frentista"
  campoDescricao="descricao"
  [valorSelecionado]="colaboradorFrentistaSelecionado"
  (selecionado)="colaboradorFrentistaSelecionado = $event?.id">
</app-autocomplete>
</div>
      </div>

      <!-- Hora / Bloco -->
      <div class="abp-group-row">
 <div class="abp-field abp-half">
  <label class="abp-label">Hora Abastecimento</label>
  <input
    type="time"
    class="os-input"
    title="Informe a hora do abastecimento"
    placeholder="Informe a hora"
    [(ngModel)]="horaAbastecimento"
    (input)="onHoraChange($event)"
  />
</div>

<div class="abp-field abp-half">
  <label class="abp-label">Bloco</label>

  <app-autocomplete
    [lista]="blocos"
    placeholder="Selecione um bloco"
    campoDescricao="descricao"
    [valorSelecionado]="blocoSelecionado"
    (selecionado)="selecionarBloco($event)">
  </app-autocomplete>

</div>
      </div>

      <!-- Observação -->
   <div class="abp-field">
  <label class="abp-label">Observação</label>

  <textarea
    class="os-input os-textarea"
    rows="3"
    title="Informe a observacao do abastecimento"
    placeholder="Informe a observacao"
    [(ngModel)]="observacao"
    (input)="onObservacaoChange($event)">
  </textarea>
</div>

      <!-- Botão confirmar -->
      <div class="abp-actions">
        <button type="button" class="abp-primary-btn" (click)="confirmar()">
          CONFIRMAR
        </button>
      </div>
    </div>
  </div>
</ion-content>
